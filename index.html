<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Think And Blink (AI Tronics)</title>
<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:30px;
  color:#e2e8f0;
  overflow:auto;

  background: radial-gradient(circle at 20% 30%, #38bdf8, transparent 40%),
              radial-gradient(circle at 80% 70%, #6366f1, transparent 40%),
              #020617;
}

.game{
  width:520px;
  padding:30px;
  border-radius:25px;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 40px rgba(56,189,248,0.2),
             0 0 80px rgba(99,102,241,0.15);
}

h2{
  text-align:center;
  margin-bottom:20px;
  font-size:26px;
  background:linear-gradient(90deg,#22d3ee,#a78bfa,#f472b6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

input{
  width:100%;
  padding:12px;
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.2);
  margin-top:10px;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  margin-top:14px;
  padding:12px 22px;
  border-radius:30px;
  border:none;
  background:linear-gradient(90deg,#22d3ee,#6366f1,#a78bfa);
  color:white;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  transform:scale(1.05);
}

.top-bar{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.timer{
  font-family:monospace;
  color:#22c55e;
}

.grid{
  display:grid;
  gap:12px;
  margin-top:30px;
}

.cell{
  height:65px;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  cursor:pointer;
  transition:0.2s;
}

.cell:hover{
  transform:scale(1.1);
}

.active{ background:#38bdf8; }
.correct{ background:#22c55e !important; }
.wrong{ background:#ef4444 !important; }

.leaderboard{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:rgba(0,0,0,0.3);

  max-height:200px;
  overflow-y:auto;

  display:flex;
  flex-direction:column;
  align-items:center;
}

.leaderboard::-webkit-scrollbar{
  width:6px;
}
.leaderboard::-webkit-scrollbar-thumb{
  background:#38bdf8;
  border-radius:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  text-align:center;
}

th{
  color:#38bdf8;
}

td{
  color:#e2e8f0;
}

th,td{
  padding:8px;
  font-size:13px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

  /* ── GAME OVER ── */
  .over-screen{text-align:center;padding:6px 0}
  .over-icon{display:block;margin:0 auto 18px}
  .over-title{
    font-family:var(--title);font-size:48px;
    letter-spacing:3px;line-height:1.1;margin-bottom:8px;
  }
  .over-title.win{color:var(--vc-cyan2);text-shadow:0 0 30px rgba(0,229,255,0.4)}
  .over-title.lose{color:var(--vc-hot2);text-shadow:0 0 30px rgba(255,45,120,0.5)}
  .over-msg{
    font-family:var(--mono);font-size:14px;
    letter-spacing:1px;color:var(--text2);margin-bottom:26px;
  }
  .score-big{
    font-family:var(--title);font-size:76px;font-weight:400;
    color:var(--vc-yellow);letter-spacing:2px;line-height:1;margin-bottom:4px;
    text-shadow:0 0 24px rgba(255,224,51,0.35);
  }
  .score-lbl{
    font-family:var(--mono);font-size:11px;
    letter-spacing:2.5px;text-transform:uppercase;
    color:var(--text3);margin-bottom:26px;
  }
  .btn-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}

  /* ── LEADERBOARD ── */
  .lb-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .lb-title{font-family:var(--title);font-size:18px;letter-spacing:2px;color:var(--vc-hot2)}
  .lb-empty{
    text-align:center;font-family:var(--mono);font-size:13px;
    color:var(--text3);padding:20px;
    border:1px dashed rgba(255,45,120,0.18);letter-spacing:1px;
  }
  .lb-table{width:100%;border-collapse:collapse}
  .lb-table th{
    font-family:var(--mono);font-size:10px;font-weight:400;
    letter-spacing:2px;text-transform:uppercase;color:var(--text3);
    padding:7px 10px;text-align:left;
    border-bottom:1px solid rgba(255,45,120,0.18);
  }
  .lb-table td{
    font-family:var(--mono);font-size:14px;
    padding:10px 10px;
    border-bottom:1px solid rgba(255,255,255,.03);
    color:var(--text2);
  }
  .lb-table tr:nth-child(2) td{color:var(--vc-yellow)}
  .lb-rank{color:var(--text3)!important}

  .fade-enter-active,.fade-leave-active{transition:opacity .2s,transform .2s}
  .fade-enter{opacity:0;transform:translateY(6px)}
  .fade-leave-to{opacity:0;transform:translateY(-6px)}
  .admin-btn{position:absolute;bottom:6px;left:6px;width:26px;height:26px;opacity:0;border:none;background:none;cursor:pointer}

  /* small screens: keep visible without clipping */
  @media (max-width:860px){
    .card{width:100%;padding:28px 24px 30px}
    .cell{height:84px}
  }
  @media (max-width:600px){
    .cell{height:76px}
    .hud-item{min-width:72px}
  }
  </style>
</head>
<body>
  <div id="app" class="card">

    <div class="header">
      <div class="logo-wrap">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <polygon points="20,4 24,14 35,14 27,21 30,32 20,25 10,32 13,21 5,14 16,14" fill="rgba(255,45,120,0.15)" stroke="#ff2d78" stroke-width="1.2"/>
          <circle cx="20" cy="20" r="4.5" fill="#ff2d78" opacity=".85"/>
          <circle cx="20" cy="20" r="1.8" fill="#0d0118"/>
          <line x1="20" y1="2" x2="20" y2="7" stroke="#00e5ff" stroke-width="1.2"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Think &amp; Blink</div>
        <div class="brand-sub">Vice City · Memory Hustle</div>
      </div>
      <div class="header-stars">
        <div class="star" v-for="n in 5" :class="{lit:n<=starsEarned}"></div>
      </div>
    </div>

</div>

<script>
new Vue({
  el:"#app",
  data:{
    name:"",
    level:1,
    score:0,
    timer:0,
    timerInt:null,
    grid:[],
    pattern:[],
    user:[],
    activeIndex:-1,
    clickedIndex:-1,
    clickState:"",
    gameStarted:false,
    gameOver:false,
    waitingInput:false
  },

  computed:{
    gridStyle(){
      let size=this.level+2;
      return {gridTemplateColumns:`repeat(${size},1fr)`};
    }
  },

  mounted(){
    this.$nextTick(() => {
      this.renderLeaderboard();
    });
  },

  methods:{
    generateGrid(){
      let size=this.level+2;
      this.grid=Array(size*size).fill(0);
    },

    generatePattern(){
      let len=this.level*3+2;
      this.pattern=[];
      for(let i=0;i<len;i++){
        this.pattern.push(Math.floor(Math.random()*this.grid.length));
      }
    },

    startGame(){
      this.level=1;
      this.score=0;
      this.gameStarted=true;
      this.gameOver=false;
      this.startLevel();
    },

  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script>
  const LEVELS=[
    {gridSize:3,patternLen:4,flashSpeed:560,baseTimer:20},
    {gridSize:3,patternLen:5,flashSpeed:520,baseTimer:22},
    {gridSize:3,patternLen:6,flashSpeed:490,baseTimer:22},
    {gridSize:4,patternLen:7,flashSpeed:460,baseTimer:24},
    {gridSize:4,patternLen:8,flashSpeed:430,baseTimer:26},
    {gridSize:4,patternLen:9,flashSpeed:400,baseTimer:26},
    {gridSize:5,patternLen:10,flashSpeed:370,baseTimer:28},
    {gridSize:5,patternLen:11,flashSpeed:340,baseTimer:28},
    {gridSize:5,patternLen:13,flashSpeed:310,baseTimer:30},
    {gridSize:6,patternLen:14,flashSpeed:280,baseTimer:30},
  ];
  new Vue({
    el:'#app',
    data:{
      name:'',screen:'intro',level:1,score:0,
      timer:0,timerInt:null,grid:[],pattern:[],user:[],
      activeIndex:-1,clickedIndex:-1,clickState:'',mistakeIndex:-1,
      waitingInput:false,locked:false,mistakes:0,won:false,lastCompletedLevel:0,
    },
    computed:{
      cfg(){return LEVELS[this.level-1]||LEVELS[LEVELS.length-1]},
      gridSize(){return this.cfg.gridSize},
      gridStyle(){return{gridTemplateColumns:`repeat(${this.gridSize},1fr)`}},
      progressPct(){
        if(!this.waitingInput||!this.pattern.length)return 0;
        return(this.user.length/this.pattern.length)*100;
      },
      timerClass(){
        if(this.timer<=5)return'hud-val danger';
        if(this.timer<=10)return'hud-val warn';
        return'hud-val go';
      },
      starsEarned(){return Math.min(5,Math.ceil((this.lastCompletedLevel||0)/2))},
    },
    mounted(){this.renderLB('lb-intro')},
    methods:{
      cellClass(i){
        const c=[];
        if(this.activeIndex===i)c.push('active');
        if(this.mistakeIndex===i)c.push('mistake');
        if(this.clickedIndex===i&&this.clickState)c.push(this.clickState);
        return c;
      },
      startGame(){
        this.level=1;this.score=0;
        this.lastCompletedLevel=0;this.won=false;
        this.screen='game';this.startLevel();
      },
      startLevel(){
        const sz=this.cfg.gridSize,len=this.cfg.patternLen;
        this.grid=Array(sz*sz).fill(0);
        this.pattern=[];let prev=-1;
        for(let i=0;i<len;i++){
          let n;
          do{n=Math.floor(Math.random()*this.grid.length)}while(n===prev);
          this.pattern.push(n);prev=n;
        }
        this.user=[];this.mistakes=0;this.locked=false;
        this.timer=this.cfg.baseTimer;this.waitingInput=false;
        this.activeIndex=-1;this.clickedIndex=-1;
        this.clickState='';this.mistakeIndex=-1;
        clearInterval(this.timerInt);
        this.showPattern();
      },
      showPattern(){
        let i=0;const spd=this.cfg.flashSpeed;
        const onDur=Math.round(spd*.52);
        const tick=setInterval(()=>{
          this.activeIndex=this.pattern[i];
          setTimeout(()=>{this.activeIndex=-1},onDur);
          i++;
          if(i>=this.pattern.length){
            clearInterval(tick);
            setTimeout(()=>{this.waitingInput=true;this.startTimer()},540);
          }
        },spd);
      },
      startTimer(){
        clearInterval(this.timerInt);
        this.timerInt=setInterval(()=>{
          if(!this.waitingInput)return;
          this.timer--;
          if(this.timer<=0)this.endGame(false);
        },1000);
      },
      clickCell(i){
        if(!this.waitingInput||this.locked)return;
        const expected=this.pattern[this.user.length];
        if(i!==expected){
          this.mistakes++;
          this.clickedIndex=i;this.clickState='wrong';this.locked=true;
          if(this.mistakes>=2){
            setTimeout(()=>{this.clickedIndex=-1;this.clickState='';this.endGame(false)},420);
          }else{
            setTimeout(()=>{
              this.mistakeIndex=i;
              this.clickedIndex=-1;this.clickState='';this.locked=false;
              setTimeout(()=>{this.mistakeIndex=-1},1200);
            },420);
          }
          return;
        }
        this.mistakeIndex=-1;
        this.clickedIndex=i;this.clickState='correct';
        this.user.push(i);
        setTimeout(()=>{this.clickedIndex=-1;this.clickState=''},200);
        if(this.user.length===this.pattern.length){
          this.lastCompletedLevel=this.level;
          this.score+=100+this.timer*5+this.level*20;
          this.waitingInput=false;
          clearInterval(this.timerInt);
          if(this.level>=LEVELS.length){
            setTimeout(()=>this.endGame(true),500);
          }else{
            this.level++;
            setTimeout(()=>this.startLevel(),700);
          }
        }
      },
      endGame(didWin){
        this.won=didWin;this.screen='over';
        clearInterval(this.timerInt);
        this.saveScore(this.lastCompletedLevel);
        this.$nextTick(()=>this.renderLB('lb-over'));
      },
      goMenu(){
        this.screen='intro';
        this.$nextTick(()=>this.renderLB('lb-intro'));
      },
      saveScore(lv){
        let d=JSON.parse(localStorage.getItem('tbl_vc'))||[];
        d.push({name:this.name||'Tommy',score:this.score,level:lv,time:this.timer});
        d.sort((a,b)=>b.level-a.level||b.score-a.score||b.time-a.time);
        localStorage.setItem('tbl_vc',JSON.stringify(d));
      },
      renderLB(id){
        const el=document.getElementById(id);if(!el)return;
        const d=JSON.parse(localStorage.getItem('tbl_vc'))||[];
        if(!d.length){
          el.innerHTML='<div class="lb-empty">No records yet — be the first to own Vice City</div>';return;
        }
        let h='<table class="lb-table"><tr><th>#</th><th>Name</th><th>Cash</th><th>Mission</th><th>Time</th></tr>';
        d.slice(0,10).forEach((r,i)=>{
          h+=`<tr><td class="lb-rank">${i+1}</td><td>${r.name}</td><td>$${r.score}</td><td>${r.level}</td><td>${r.time}s</td></tr>`;
        });
        el.innerHTML=h+'</table>';
      },
      toggleAdmin(){
        localStorage.removeItem('tbl_vc');
        this.renderLB('lb-intro');this.renderLB('lb-over');
      },
    },
  });
  </script>
</body>
</html>
