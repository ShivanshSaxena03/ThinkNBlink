<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Think And Blink (AI Tronics)</title>
<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:30px;
  color:#e2e8f0;
  overflow:auto;

  background: radial-gradient(circle at 20% 30%, #38bdf8, transparent 40%),
              radial-gradient(circle at 80% 70%, #6366f1, transparent 40%),
              #020617;
}

.game{
  width:520px;
  padding:30px;
  border-radius:25px;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 40px rgba(56,189,248,0.2),
             0 0 80px rgba(99,102,241,0.15);
}

h2{
  text-align:center;
  margin-bottom:20px;
  font-size:26px;
  background:linear-gradient(90deg,#22d3ee,#a78bfa,#f472b6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

input{
  width:100%;
  padding:12px;
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.2);
  margin-top:10px;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  margin-top:14px;
  padding:12px 22px;
  border-radius:30px;
  border:none;
  background:linear-gradient(90deg,#22d3ee,#6366f1,#a78bfa);
  color:white;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  transform:scale(1.05);
}

.top-bar{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.timer{
  font-family:monospace;
  color:#22c55e;
}

.grid{
  display:grid;
  gap:12px;
  margin-top:30px;
}

.cell{
  height:65px;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  cursor:pointer;
  transition:0.2s;
}

.cell:hover{
  transform:scale(1.1);
}

.active{ background:#38bdf8; }
.correct{ background:#22c55e !important; }
.wrong{ background:#ef4444 !important; }

.leaderboard{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:rgba(0,0,0,0.3);

  max-height:200px;
  overflow-y:auto;

  display:flex;
  flex-direction:column;
  align-items:center;
}

.leaderboard::-webkit-scrollbar{
  width:6px;
}
.leaderboard::-webkit-scrollbar-thumb{
  background:#38bdf8;
  border-radius:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  text-align:center;
}

th{
  color:#38bdf8;
}

td{
  color:#e2e8f0;
}

th,td{
  padding:8px;
  font-size:13px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

.admin-btn{
  position:fixed;
  bottom:5px;
  left:5px;
  width:30px;
  height:30px;
  opacity:0;
}
</style>
</head>

<body>

<div id="app" class="game">

<h2>⚡ Think And Blink (AI Tronics)</h2>

<div v-if="!gameStarted && !gameOver">
  <input v-model="name" placeholder="Enter Name">
  <button @click="startGame">Start Game</button>

  <div class="leaderboard">
    <h3>🏆 Leaderboard</h3>
    <table id="leaderboardTable"></table>
  </div>
</div>

<div v-if="gameStarted">
  <div class="top-bar">
    <span>Level: {{ level }}</span>
    <span>Score: {{ score }}</span>
    <span class="timer">⏱ {{ timer }}</span>
  </div>

  <div class="grid" :style="gridStyle">
    <div v-for="(c,i) in grid"
         :key="i"
         class="cell"
         :class="[
           activeIndex === i ? 'active' : '',
           clickedIndex === i ? clickState : ''
         ]"
         @click="clickCell(i)">
    </div>
  </div>
</div>

<div v-if="gameOver">
  <h3>Game Over</h3>
  <p>Score: {{ score }}</p>
  <button @click="reset">Play Again</button>
</div>

<div class="admin-btn" @click="toggleAdmin"></div>

</div>

<script>
new Vue({
  el:"#app",
  data:{
    name:"",
    level:1,
    score:0,
    timer:0,
    timerInt:null,
    grid:[],
    pattern:[],
    user:[],
    activeIndex:-1,
    clickedIndex:-1,
    clickState:"",
    gameStarted:false,
    gameOver:false,
    waitingInput:false
  },

  computed:{
    gridStyle(){
      let size=this.level+2;
      return {gridTemplateColumns:`repeat(${size},1fr)`};
    }
  },

  mounted(){
    this.$nextTick(() => {
      this.renderLeaderboard();
    });
  },

  methods:{
    generateGrid(){
      let size=this.level+2;
      this.grid=Array(size*size).fill(0);
    },

    generatePattern(){
      let len=this.level*3+2;
      this.pattern=[];
      for(let i=0;i<len;i++){
        this.pattern.push(Math.floor(Math.random()*this.grid.length));
      }
    },

    startGame(){
      this.level=1;
      this.score=0;
      this.gameStarted=true;
      this.gameOver=false;
      this.startLevel();
    },

    startLevel(){
      this.generateGrid();
      this.generatePattern();
      this.user=[];
      this.timer=12+this.level*4;
      this.waitingInput=false;
      this.showPattern();
    },

    showPattern(){
      let i=0;
      let interval=setInterval(()=>{
        this.activeIndex=this.pattern[i];
        setTimeout(()=>this.activeIndex=-1,250);
        i++;

        if(i>=this.pattern.length){
          clearInterval(interval);
          setTimeout(()=>{
            this.waitingInput=true;
            this.startTimer();
          },500);
        }
      },420);
    },

    startTimer(){
      clearInterval(this.timerInt);
      this.timerInt=setInterval(()=>{
        if(!this.waitingInput) return;
        this.timer--;
        if(this.timer<=0) this.endGame();
      },1000);
    },

    clickCell(i){
      if(!this.waitingInput) return;

      this.clickedIndex=i;

      if(i!==this.pattern[this.user.length]){
        this.clickState="wrong";
        setTimeout(()=>{
          this.clickedIndex=-1;
          this.clickState="";
          this.endGame();
        },350);
        return;
      }

      this.clickState="correct";
      this.user.push(i);

      setTimeout(()=>{
        this.clickedIndex=-1;
        this.clickState="";
      },200);

      if(this.user.length===this.pattern.length){
        this.score+=100+this.timer*5;

        if(this.level===4){
          this.endGame();
          return;
        }

        this.level++;
        this.waitingInput=false;
        setTimeout(()=>this.startLevel(),800);
      }
    },

    endGame(){
      this.gameOver=true;
      this.gameStarted=false;
      clearInterval(this.timerInt);
      this.saveScore();
      this.$nextTick(()=>this.renderLeaderboard());
    },

    saveScore(){
      let data=JSON.parse(localStorage.getItem("tb"))||[];

      data.push({
        name:this.name,
        score:this.score,
        level:this.level,
        time:this.timer
      });

      data.sort((a,b)=>b.score-a.score);
      localStorage.setItem("tb",JSON.stringify(data));
    },

    renderLeaderboard(){
      let table=document.getElementById("leaderboardTable");
      if(!table) return;

      let data=JSON.parse(localStorage.getItem("tb"))||[];

      if(data.length===0){
        table.innerHTML=`<tr>
          <td colspan="5" style="padding:15px;">✨ No records yet — be the first!</td>
        </tr>`;
        return;
      }

      let html=`<tr>
        <th>#</th><th>Name</th><th>Score</th><th>Level</th><th>Time</th>
      </tr>`;

      data.slice(0,10).forEach((d,i)=>{
        let medal="";
        if(i===0) medal="🥇";
        else if(i===1) medal="🥈";
        else if(i===2) medal="🥉";

        html+=`<tr>
          <td>${medal ? medal : i+1}</td>
          <td>${d.name}</td>
          <td>${d.score}</td>
          <td>${d.level}</td>
          <td>${d.time}</td>
        </tr>`;
      });

      table.innerHTML=html;
    },

    reset(){
      this.gameOver=false;
      this.$nextTick(()=>this.renderLeaderboard());
    },

    toggleAdmin(){
      localStorage.clear();
      alert("Leaderboard Reset");
      this.renderLeaderboard();
    }
  }
});
</script>

</body>
</html>
